<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ICD-10 → SNOMED Mapper</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #2563eb;
  --blue-lt: #eff6ff;
  --green:   #16a34a;
  --green-lt:#f0fdf4;
  --amber:   #d97706;
  --amber-lt:#fffbeb;
  --purple:  #7c3aed;
  --purple-lt:#f5f3ff;
  --red:     #dc2626;
  --red-lt:  #fef2f2;
  --gray-50: #f8fafc;
  --gray-100:#f1f5f9;
  --gray-200:#e2e8f0;
  --gray-400:#94a3b8;
  --gray-600:#475569;
  --gray-800:#1e293b;
  --shadow:  0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
}

body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background: var(--gray-50);
  color: var(--gray-800);
  min-height: 100vh;
}

/* ── Header ───────────────────────────────────────────────────────────── */
header {
  background: white;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  height: 60px;
  box-shadow: var(--shadow);
}
header h1 { font-size: 18px; font-weight: 700; }
header p  { font-size: 13px; color: var(--gray-400); margin-top: 1px; }

/* ── Banners ──────────────────────────────────────────────────────────── */
.banner { padding: 8px 24px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.banner.warn   { background:var(--amber-lt); border-bottom:1px solid #fde68a; color:#92400e; }
.banner.ok     { background:var(--green-lt); border-bottom:1px solid #bbf7d0; color:#14532d; }
.banner.error  { background:var(--red-lt);   border-bottom:1px solid #fecaca; color:var(--red); }
.banner.hidden { display:none; }

/* ── Layout ───────────────────────────────────────────────────────────── */
main { max-width: 1280px; margin: 28px auto; padding: 0 24px; }

.search-box {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 20px 24px;
  box-shadow: var(--shadow-md);
  margin-bottom: 24px;
}
.search-box label {
  display: block;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing:.06em; color:var(--gray-400); margin-bottom:8px;
}
.search-row { display:flex; gap:10px; }
.search-row input {
  flex:1; border:1.5px solid var(--gray-200); border-radius:8px;
  padding:10px 14px; font-size:16px;
  font-family:"SF Mono","Fira Code",monospace; outline:none;
  transition:border-color .15s;
}
.search-row input:focus { border-color:var(--blue); }
.search-row button {
  background:var(--blue); color:white; border:none;
  border-radius:8px; padding:10px 24px; font-size:15px;
  font-weight:600; cursor:pointer; transition:opacity .15s;
}
.search-row button:hover  { opacity:.88; }
.search-row button:active { opacity:.75; }
.examples { margin-top:10px; font-size:12.5px; color:var(--gray-400); }
.examples a {
  color:var(--blue); text-decoration:none;
  font-family:"SF Mono","Fira Code",monospace; cursor:pointer;
}
.examples a:hover { text-decoration:underline; }

/* ── ICD-10 header card ─────────────────────────────────────────────── */
.icd-card {
  background: white;
  border:1px solid var(--gray-200); border-radius:12px;
  padding:16px 20px; margin-bottom:20px;
  box-shadow:var(--shadow);
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.icd-badge {
  background:#e0f2fe; color:#0369a1;
  padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:700; letter-spacing:.04em;
  text-transform:uppercase; flex-shrink:0;
}
.icd-name  { font-size:18px; font-weight:700; flex:1; min-width:200px; }
.icd-meta  { font-size:12.5px; color:var(--gray-400); font-family:monospace; }
.icd-link  { font-size:12px; color:var(--blue); text-decoration:none; margin-left:auto; flex-shrink:0; }
.icd-link:hover { text-decoration:underline; }

/* ── Comparison grid ────────────────────────────────────────────────── */
.compare-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:start;
}
@media(max-width:860px) { .compare-grid { grid-template-columns:1fr; } }

.panel {
  background:white;
  border:1px solid var(--gray-200);
  border-radius:12px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.panel-header {
  padding:12px 18px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--gray-200);
}
.panel-icon {
  width:28px; height:28px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; flex-shrink:0;
}
.panel-icon.direct { background:#dbeafe; color:var(--blue); }
.panel-icon.vector { background:#ede9fe; color:var(--purple); }
.panel-title { font-size:14px; font-weight:700; }
.panel-sub   { font-size:12px; color:var(--gray-400); margin-top:1px; }
.panel-body  { padding:16px 18px; }

/* ── Type badge ────────────────────────────────────────────────────── */
.type-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:700; margin-bottom:14px;
}
.badge-pre    { background:var(--green-lt);  color:var(--green);  border:1px solid #bbf7d0; }
.badge-post   { background:var(--amber-lt);  color:var(--amber);  border:1px solid #fde68a; }
.badge-none   { background:var(--red-lt);    color:var(--red);    border:1px solid #fecaca; }
.badge-vector { background:var(--purple-lt); color:var(--purple); border:1px solid #ddd6fe; }

/* ── SNOMED concept card ────────────────────────────────────────────── */
.snomed-card {
  border:1px solid var(--gray-200); border-radius:8px;
  padding:12px 14px; margin-bottom:10px;
}
.snomed-badge {
  background:#ede9fe; color:#6d28d9;
  padding:2px 8px; border-radius:14px;
  font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  display:inline-block; margin-bottom:6px;
}
.snomed-name { font-size:15px; font-weight:600; line-height:1.3; }
.snomed-code { font-size:12px; font-family:monospace; color:var(--gray-400); margin-top:2px; }

/* ── OWL expression ─────────────────────────────────────────────────── */
.expr-box {
  background:var(--gray-50); border:1px solid var(--gray-200);
  border-radius:8px; padding:12px 14px;
  font-family:"SF Mono","Fira Code",monospace; font-size:12px;
  line-height:1.7; white-space:pre-wrap; word-break:break-word;
  margin-top:10px;
}
.role-pill {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--blue-lt); border:1px solid #bfdbfe;
  border-radius:20px; padding:3px 10px; margin:3px 3px 3px 0;
  font-size:12px;
}
.role-pill .attr { color:var(--blue); font-weight:600; }
.role-pill .val  { color:var(--gray-700); }

/* ── Vector match candidate ─────────────────────────────────────────── */
.match-card {
  border:1px solid var(--gray-200); border-radius:8px;
  padding:12px 14px; margin-bottom:10px;
  cursor:pointer; transition:border-color .15s;
}
.match-card:hover { border-color:#c4b5fd; }
.match-card.open  { border-color:var(--purple); }
.match-header { display:flex; align-items:flex-start; gap:10px; }
.match-rank {
  flex-shrink:0; width:22px; height:22px; border-radius:50%;
  background:var(--purple-lt); color:var(--purple);
  font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
}
.match-name  { font-size:14px; font-weight:600; flex:1; line-height:1.3; }
.match-score {
  flex-shrink:0; font-size:11px; font-family:monospace;
  background:var(--gray-100); border-radius:6px;
  padding:2px 7px; color:var(--gray-600);
}
.match-code  { font-size:11px; font-family:monospace; color:var(--gray-400); margin-top:2px; }
.match-body  { display:none; margin-top:10px; }
.match-card.open .match-body { display:block; }

/* ── Misc ───────────────────────────────────────────────────────────── */
.section-label {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.07em; color:var(--gray-400); margin-bottom:8px;
}
.divider { border:none; border-top:1px solid var(--gray-100); margin:12px 0; }
.athena-link {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11.5px; color:var(--blue); text-decoration:none; margin-top:6px;
}
.athena-link:hover { text-decoration:underline; }
.empty-state { color:var(--gray-400); font-size:13px; padding:8px 0; }

/* ── Spinner / error ──────────────────────────────────────────────── */
#spinner { display:none; justify-content:center; align-items:center; gap:10px;
           padding:48px; color:var(--gray-400); font-size:14px; }
#spinner.show { display:flex; }
.spin { width:20px; height:20px; border:2.5px solid var(--gray-200);
        border-top-color:var(--blue); border-radius:50%;
        animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#error-box { display:none; background:var(--red-lt); border:1px solid #fecaca;
             border-radius:10px; padding:14px 18px; color:var(--red); font-size:14px; }
#error-box.show { display:block; }
#results { display:none; }
#results.show { display:block; }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
  </svg>
  <div>
    <h1>ICD-10 → SNOMED Mapper</h1>
    <p>Athena direct mapping vs OWL2Vec vector matching</p>
  </div>
</header>

<div id="banner-athena"  class="banner hidden"></div>
<div id="banner-owl"     class="banner hidden"></div>
<div id="banner-owl2vec" class="banner hidden"></div>
<div id="banner-biobert" class="banner hidden"></div>

<main>
  <div class="search-box">
    <label>ICD-10 Code</label>
    <div class="search-row">
      <input id="code-input" type="text" placeholder="e.g. E11.22"
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button onclick="search()">Compare</button>
    </div>
    <div class="examples">
      Try:
      <a onclick="setCode('E11.22')">E11.22</a> ·
      <a onclick="setCode('I10')">I10</a> ·
      <a onclick="setCode('J45.20')">J45.20</a> ·
      <a onclick="setCode('C77.0')">C77.0</a> ·
      <a onclick="setCode('C78.0')">C78.0</a> ·
      <a onclick="setCode('F32.1')">F32.1</a>
    </div>
  </div>

  <div id="spinner"><div class="spin"></div> Looking up…</div>
  <div id="error-box"></div>
  <div id="results"></div>
</main>

<script>
const codeInput = document.getElementById('code-input');
codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
function setCode(c) { codeInput.value = c; search(); }

// ── Status polling ─────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());

    const ba = document.getElementById('banner-athena');
    const bo = document.getElementById('banner-owl');
    const bv = document.getElementById('banner-owl2vec');

    if (!d.athena_ready) {
      ba.className = 'banner warn';
      ba.textContent = 'Loading Athena vocabulary files…';
    } else if (!d.has_icd10cm) {
      ba.className = 'banner warn';
      ba.textContent = 'ICD10CM not found — re-download from athena.ohdsi.org with both ICD10CM + SNOMED.';
    } else {
      ba.className = 'banner ok';
      ba.textContent = 'Athena vocabulary ready — ICD10CM + SNOMED loaded.';
    }

    if (!d.owl_ready) {
      bo.className = 'banner warn';
      bo.textContent = 'SNOMED OWL cache building — post-coordinated expressions unavailable.';
    } else {
      bo.className = 'banner ok';
      bo.textContent = `SNOMED OWL ready — ${d.owl_concepts.toLocaleString()} concepts.`;
    }

    if (d.owl2vec_error) {
      bv.className = 'banner warn';
      bv.textContent = 'OWL2Vec: ' + d.owl2vec_error;
    } else if (!d.owl2vec_ready) {
      bv.className = 'banner warn';
      bv.textContent = 'OWL2Vec model not loaded — run: .venv311/bin/python owl2vec_train.py';
    } else {
      bv.className = 'banner ok';
      bv.textContent = 'OWL2Vec model ready — vector-based matching active.';
    }

    const bb = document.getElementById('banner-biobert');
    if (d.biobert_error) {
      bb.className = 'banner warn';
      bb.textContent = 'BioBERT: ' + d.biobert_error;
    } else if (!d.biobert_ready) {
      bb.className = 'banner warn';
      bb.textContent = 'BioBERT index not built — run: .venv311/bin/python build_biobert_index.py  (~16 min, runs once)';
    } else {
      bb.className = 'banner ok';
      bb.textContent = 'BioBERT index ready — contextual ICD-10 → SNOMED matching active.';
    }

    if (!d.athena_ready || !d.owl_ready || !d.owl2vec_ready || !d.biobert_ready) setTimeout(pollStatus, 3000);
  } catch (_) { setTimeout(pollStatus, 3000); }
}
pollStatus();

// ── Search ─────────────────────────────────────────────────────────────
async function search() {
  const code = codeInput.value.trim();
  if (!code) return;

  const spinner  = document.getElementById('spinner');
  const results  = document.getElementById('results');
  const errorBox = document.getElementById('error-box');

  spinner.classList.add('show');
  results.classList.remove('show');
  errorBox.classList.remove('show');
  results.innerHTML = '';

  try {
    const r = await fetch(`/api/map/${encodeURIComponent(code)}`);
    const d = await r.json();
    spinner.classList.remove('show');
    if (d.error) { errorBox.textContent = d.error; errorBox.classList.add('show'); return; }
    render(d);
    results.classList.add('show');
  } catch (e) {
    spinner.classList.remove('show');
    errorBox.textContent = 'Network error: ' + e.message;
    errorBox.classList.add('show');
  }
}

// ── Render ─────────────────────────────────────────────────────────────
function render(d) {
  const el = document.getElementById('results');
  const icd = d.icd10;

  // ICD-10 header
  let html = `
    <div class="icd-card">
      <span class="icd-badge">ICD-10-CM</span>
      <div>
        <div class="icd-name">${esc(icd.name || '')}</div>
        <div class="icd-meta">${esc(icd.code || '')} &nbsp;·&nbsp; ${esc(icd.domainId || '')} &nbsp;·&nbsp; concept ${esc(String(icd.id || ''))}</div>
      </div>
      <a class="icd-link" href="https://athena.ohdsi.org/search-terms/terms/${icd.id}" target="_blank">View in Athena ↗</a>
    </div>`;

  // Two-panel grid
  html += `<div class="compare-grid">`;
  html += renderDirectPanel(d);
  html += renderVectorPanel(d);
  html += `</div>`;

  el.innerHTML = html;
}

// ── Left panel: Direct (Athena) mapping ───────────────────────────────
function renderDirectPanel(d) {
  let body = '';

  if (d.type === 'pre-coordinated') {
    body += `<div class="type-badge badge-pre">✓ Direct mapping</div>`;
    for (let i = 0; i < d.snomed.length; i++) {
      body += renderSnomedCard(d.snomed[i]);
      const pc = d.post_coords?.[i];
      if (pc) body += renderOWLExpression(pc);
    }
    if (d.maps_to_value?.length) {
      body += `<div class="section-label" style="margin-top:14px">Maps to value</div>`;
      for (const s of d.maps_to_value) body += renderSnomedCard(s);
    }

  } else if (d.type === 'post-coordinated') {
    body += `<div class="type-badge badge-post">↑ Parent-code mapping</div>`;
    const p = d.parent_icd10 || {};
    body += `<div style="font-size:12.5px;color:var(--gray-600);margin-bottom:10px">
      No direct mapping — using parent code <strong>${esc(p.code||'')}</strong> (${esc(p.name||'')})
    </div>`;
    body += renderSnomedCard(d.focus_snomed);
    if (d.post_coord) body += renderOWLExpression(d.post_coord);

  } else {
    body += `<div class="type-badge badge-none">✗ No Athena mapping</div>`;
    body += `<p class="empty-state">No SNOMED mapping found in Athena for this code or any parent code.</p>`;
  }

  return `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon direct">A</div>
        <div>
          <div class="panel-title">Direct Mapping</div>
          <div class="panel-sub">Athena OMOP vocabulary (concept_relationship)</div>
        </div>
      </div>
      <div class="panel-body">${body}</div>
    </div>`;
}

// ── Right panel: BioBERT + OWL2Vec two-stage pipeline ─────────────────
function renderVectorPanel(d) {
  let body = '';
  const vm = d.vector_match;

  const method = vm?.method || '';

  if (!vm && !d.owl2vec_ready && !d.biobert_ready) {
    body = `<p class="empty-state">Neither BioBERT index nor OWL2Vec model loaded.<br>
      Build index: <code>.venv311/bin/python build_biobert_index.py</code></p>`;
  } else if (method === 'owl2vec') {
    // OWL2Vec-only fallback (BioBERT index not built yet)
    body += `<div class="type-badge badge-vector">OWL2Vec label match (BioBERT index not built)</div>`;
    if (vm?.matches?.length) {
      for (let i = 0; i < vm.matches.length; i++) body += renderMatchCard(vm.matches[i], i+1);
    } else {
      body += `<p class="empty-state">No OWL2Vec matches found.</p>`;
    }
  } else if (!vm || method !== 'biobert+owl2vec') {
    body = `<p class="empty-state">No vector matches found.</p>`;
  } else {
    // Two-stage BioBERT + OWL2Vec result
    const hits = vm.biobert_hits || [];
    const pc   = vm.post_coord   || {};

    body += `<div class="type-badge badge-vector">BioBERT → OWL2Vec two-stage</div>`;

    // Stage 1: BioBERT top-K hits
    body += `<div class="section-label" style="margin-top:2px">
      Stage 1 — BioBERT top-${hits.length} similar SNOMED concepts</div>`;
    body += `<div style="font-size:11.5px;color:var(--gray-400);margin-bottom:8px">
      Query: <em>${esc(vm.icd10_label)}</em></div>`;

    for (const h of hits) {
      body += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-100)">
        <span class="snomed-badge" style="font-size:9px">SNOMED</span>
        <span style="flex:1;font-size:13px;font-weight:500">${esc(h.label)}</span>
        <span style="font-family:monospace;font-size:11px;color:var(--gray-400)">${esc(h.id)}</span>
        <span class="match-score">sim ${h.score}</span>
      </div>`;
    }

    // Stage 2: OWL2Vec consensus post-coord
    if (pc.consensus_attrs?.length) {
      body += `<div class="section-label" style="margin-top:14px">
        Stage 2 — OWL2Vec consensus post-coordinated expression</div>`;
      body += `<div style="font-size:11.5px;color:var(--gray-400);margin-bottom:8px">
        Attributes aggregated from top-${hits.length} concept neighbourhood; values ranked by
        consensus vector analogy.</div>`;

      // Expression box
      if (pc.expression) {
        body += `<div class="expr-box">${esc(pc.expression)}</div>`;
      }

      // Attribute breakdown
      body += `<div class="attr-breakdown" style="margin-top:12px">`;
      for (const a of pc.consensus_attrs) {
        const agreeColor = a.agreement === a.topk ? 'var(--green)' : 'var(--amber)';
        const best = a.values?.[0];
        body += `
          <div class="match-card" style="margin-bottom:8px" onclick="this.classList.toggle('open')">
            <div class="match-header">
              <div style="flex:1">
                <span style="font-weight:600;font-size:13px">${esc(a.attr.label)}</span>
                <span style="font-size:11px;color:var(--gray-400);margin-left:6px">${esc(a.attr.id)}</span>
              </div>
              <span style="font-size:11px;font-weight:600;color:${agreeColor};margin-right:8px">
                ${a.agreement}/${a.topk} concepts agree
              </span>
              <span class="chevron" style="font-size:10px;color:var(--gray-400)">▶</span>
            </div>
            ${best ? `<div style="font-size:12.5px;color:var(--blue);padding:2px 0 0 0">
              → <strong>${esc(best.label)}</strong>
              <span style="color:var(--gray-400);font-family:monospace;font-size:11px">(${esc(best.id)}, sim ${best.score})</span>
              ${best.in_owl ? '<span style="color:var(--green);font-size:10px;margin-left:4px">✓ OWL confirmed</span>' : ''}
            </div>` : ''}
            <div class="match-body">
              <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">
                ${(a.values||[]).map((v,i) => `
                  <div class="value-chip" style="${i===0?'border-color:var(--blue)':''}">
                    <span class="v-id">${esc(v.id)} · ${v.score}${v.in_owl?' ✓':''}</span>
                    <span class="v-name" style="${i===0?'font-weight:600':''}">
                      ${esc(v.label)}
                    </span>
                  </div>`).join('')}
              </div>
            </div>
          </div>`;
      }
      body += `</div>`;
    } else {
      body += `<div class="owl-note" style="margin-top:10px">
        OWL2Vec found no common role patterns in the top-${hits.length} SNOMED neighbourhood.</div>`;
    }
  }

  return `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon vector">V</div>
        <div>
          <div class="panel-title">Vector Match</div>
          <div class="panel-sub">BioBERT similarity → OWL2Vec post-coordination</div>
        </div>
      </div>
      <div class="panel-body">${body}</div>
    </div>`;
}

// ── Sub-renderers ──────────────────────────────────────────────────────
function renderSnomedCard(s) {
  const id = s.id || s.conceptId || '';
  return `
    <div class="snomed-card">
      <span class="snomed-badge">SNOMED CT</span>
      <div class="snomed-name">${esc(s.name || '')}</div>
      <div class="snomed-code">${esc(s.code || '')} &nbsp;·&nbsp; concept ${esc(String(id))}</div>
      <a class="athena-link" href="https://athena.ohdsi.org/search-terms/terms/${id}" target="_blank">Athena ↗</a>
    </div>`;
}

function renderOWLExpression(pc) {
  if (!pc) return '';
  const roles = pc.own_roles || [];
  const parents = pc.parents || [];
  if (!roles.length) return '';

  let html = `<div class="section-label" style="margin-top:12px">OWL2Vec post-coordinated expression</div>`;
  html += `<div class="expr-box">`;
  const fp = parents[0];
  if (fp) html += `${esc(fp.id)} | ${esc(fp.label)} | :\n  {`;
  for (const r of roles) {
    // Show OWL2Vec top prediction vs actual value
    const top = r.values_owl2vec?.[0];
    const match = top && top.id === r.val.id;
    const checkmark = match ? ' ✓' : '';
    html += `\n    ${esc(r.attr.id)} | ${esc(r.attr.label)} | = ${esc(r.val.id)} | ${esc(r.val.label)} |${checkmark}`;
  }
  if (fp) html += `\n  }`;
  html += `</div>`;

  // Role pills with OWL2Vec confirmation
  html += `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">`;
  for (const r of roles) {
    const top = r.values_owl2vec?.[0];
    const match = top && top.id === r.val.id;
    html += `<span class="role-pill" title="${top ? 'OWL2Vec top: ' + esc(top.label) + ' (' + top.score + ')' : 'No OWL2Vec prediction'}">
      <span class="attr">${esc(r.attr.label)}</span>
      <span style="color:var(--gray-400)">→</span>
      <span class="val">${esc(r.val.label)}</span>
      ${match ? '<span style="color:var(--green);font-size:10px">✓</span>' : ''}
    </span>`;
  }
  html += `</div>`;
  return html;
}

function renderMatchCard(m, rank) {
  const c  = m.candidate;
  const pc = m.post_coord;
  const id = `match-${rank}`;
  const roles = pc?.own_roles || [];
  const parents = pc?.parents || [];

  let body = '';
  if (roles.length && parents[0]) {
    const fp = parents[0];
    body += `<div class="section-label">OWL definition</div>`;
    body += `<div class="expr-box">`;
    body += `${esc(fp.id)} | ${esc(fp.label)} | :\n  {`;
    for (const r of roles) {
      body += `\n    ${esc(r.attr.id)} | ${esc(r.attr.label)} | = ${esc(r.val.id)} | ${esc(r.val.label)} |`;
    }
    body += `\n  }`;
    body += `</div>`;
    body += `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:5px">`;
    for (const r of roles) {
      body += `<span class="role-pill">
        <span class="attr">${esc(r.attr.label)}</span>
        <span style="color:var(--gray-400)">→</span>
        <span class="val">${esc(r.val.label)}</span>
      </span>`;
    }
    body += `</div>`;
  } else {
    body += `<p class="empty-state" style="font-size:12px">No defining roles in OWL — primitive concept.</p>`;
  }
  body += `<a class="athena-link" href="https://athena.ohdsi.org/search-terms/terms/${c.id}" target="_blank">View in Athena ↗</a>`;

  return `
    <div class="match-card" id="${id}" onclick="toggleMatch('${id}')">
      <div class="match-header">
        <span class="match-rank">${rank}</span>
        <div style="flex:1">
          <div class="match-name">${esc(c.label)}</div>
          <div class="match-code">${esc(c.id)}</div>
        </div>
        <span class="match-score">sim ${c.score}</span>
      </div>
      <div class="match-body">${body}</div>
    </div>`;
}

function toggleMatch(id) {
  document.getElementById(id).classList.toggle('open');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
